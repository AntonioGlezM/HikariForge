spring:
  application:
    name: hikariforge

  datasource:
    # Los valores se leen de variables de entorno; entre llaves van los valores por defecto
    # (cómodos para desarrollo local con la base de datos en Docker).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hikariforge}
    username: ${DB_USER:hikariforge}
    password: ${DB_PASSWORD:hikari1234}

  jpa:
    hibernate:
      # 'validate': Hibernate NO toca el esquema, solo comprueba que coincide con las entidades.
      # Quien crea/actualiza las tablas es Flyway (control de versiones del esquema).
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# Configuración propia de la aplicación (clave JWT y caducidad del token).
app:
  jwt:
    # IMPORTANTE: en producción esta clave debe venir de una variable de entorno, nunca en el código.
    secret: ${JWT_SECRET:--------------------clave-secreta-larga-y-aleatoria-de-al-menos-32-bytes}
    expiration-ms: 86400000 # 24 horas

# Ruta de Swagger UI: http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Login con Google: client ID de la app creada en Google Cloud Console.
google:
  client-id: ${GOOGLE_CLIENT_ID:1017756267621-1ujk6kpe0tn6ibe0qh90qkqv81f61opr.apps.googleusercontent.com}
